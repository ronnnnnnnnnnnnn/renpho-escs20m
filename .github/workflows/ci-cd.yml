name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (leave empty to use version from _version.py)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install '.[tests]'
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Run tests
        run: pytest

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    # Uses PyPI Trusted Publishing (OIDC) — no API token needed.
    # Configure once at https://pypi.org/manage/project/renpho-escs20m/settings/publishing/
    # with: workflow filename "ci-cd.yml", environment name "pypi".
    environment:
      name: pypi
      url: https://pypi.org/p/renpho-escs20m
    permissions:
      id-token: write   # OIDC token for PyPI Trusted Publishing
      contents: write   # commit version bump and create GitHub release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Clean dist
        run: rm -rf dist/
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Resolve version
        id: extract_version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            # Validate to defend against shell metacharacters in workflow_dispatch input
            if ! [[ "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-]?(alpha|beta|rc)\.?[0-9]*)?$ ]]; then
              echo "::error::Invalid version string: $INPUT_VERSION"
              exit 1
            fi
            VERSION="$INPUT_VERSION"
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git pull origin main
            sed -i "s/__version__ = .*/__version__ = \"$VERSION\"/" src/renpho_escs20m/_version.py
            git add src/renpho_escs20m/_version.py
            git commit -m "Bump version to $VERSION"
            git push
          else
            VERSION=$(python -c "exec(open('src/renpho_escs20m/_version.py').read()); print(__version__)")
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          if [[ "$VERSION" =~ (alpha|beta|rc) ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
          fi
      - name: Build sdist and wheel
        run: python -m build
      - name: Create or update GitHub release
        id: create_release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = `v${process.env.VERSION}`;
            const isPrerelease = process.env.IS_PRERELEASE === 'true';
            try {
              const { data: existing } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              const { data: updated } = await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.id,
                name: `Release ${tag}`,
                body: `Updated release for ${tag}`,
                prerelease: isPrerelease,
              });
              core.setOutput('release_id', updated.id);
            } catch (error) {
              if (error.status !== 404) throw error;
              const { data: created } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `Release ${tag}`,
                body: `Release for ${tag}`,
                draft: false,
                prerelease: isPrerelease,
              });
              core.setOutput('release_id', created.id);
            }
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Wait for PyPI propagation
        run: sleep 120
      - name: Verify install from PyPI
        run: |
          python -m venv test-env
          . test-env/bin/activate
          pip install "renpho-escs20m==$VERSION"
          python -c "from renpho_escs20m import RenphoESCS20MScale, WeightUnit; print('Import OK:', RenphoESCS20MScale, WeightUnit)"
      - name: Upload release assets
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs').promises;
            const path = require('path');
            const files = await fs.readdir('dist');
            for (const file of files) {
              const filePath = path.join('dist', file);
              const stats = await fs.stat(filePath);
              if (stats.isFile()) {
                await github.rest.repos.uploadReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: ${{ steps.create_release.outputs.release_id }},
                  name: file,
                  data: await fs.readFile(filePath),
                });
              }
            }
